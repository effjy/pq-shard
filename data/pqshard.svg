<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Dark cyber background, matching the PQ tool family (#070b12 / #0e1726). -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <!-- Neon green->cyan for the active shard. -->
    <linearGradient id="shard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Panel -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"
        stroke="#00e5ff" stroke-width="3" stroke-opacity="0.55"/>

  <!-- Faint circuit traces for the cyber feel -->
  <g stroke="#00e5ff" stroke-opacity="0.18" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M28 72 H58"/>
    <path d="M228 184 H198"/>
    <circle cx="58" cy="72" r="4" fill="#00e5ff" fill-opacity="0.3" stroke="none"/>
    <circle cx="198" cy="184" r="4" fill="#00e5ff" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- A hexagonal secret, split into three wedge "shards" from the centre.
       Centre (128,128). Hexagon vertices at 0/60/120/180/240/300 degrees,
       radius 78: pointy-top is avoided so the split lines hit flat regions. -->
  <g transform="translate(128,128)">
    <!-- Three shards. Each spans 120 degrees; the top one is highlighted to
         read as "one share of three". A small gap between them shows the split. -->
    <!-- Shard A (top): vertices at -90deg region. -->
    <path d="M0 0 L4 -76 A78 78 0 0 1 69 36 L6 4 Z"
          fill="#0c1a2b" stroke="#00e5ff" stroke-width="5" stroke-linejoin="round"/>
    <!-- Shard B (bottom): -->
    <path d="M-6 4 L61 42 A78 78 0 0 1 -67 41 L-6 4 Z"
          fill="#0c1a2b" stroke="#00e5ff" stroke-width="5" stroke-linejoin="round"/>
    <!-- Shard C (left), the highlighted/extracted one, pulled out slightly: -->
    <path d="M-9 -2 L-74 38 A78 78 0 0 1 -1 -78 L-3 -4 Z"
          transform="translate(-10,-6)"
          fill="url(#shard)" stroke="#39ff14" stroke-width="4" stroke-linejoin="round"/>

    <!-- Centre node (the reconstructed point at x=0). -->
    <circle cx="0" cy="0" r="11" fill="#070b12" stroke="#00e5ff" stroke-width="4"/>
    <circle cx="0" cy="0" r="4" fill="#39ff14"/>
  </g>
</svg>
